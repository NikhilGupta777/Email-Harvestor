<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Harvester Web Interface</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* Basic Terminal-Styling */
        body {
            font-family: 'Courier New', Courier, monospace;
            background-color: #1e1e1e;
            /* Dark background */
            color: #d4d4d4;
            /* Light text */
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            height: 100vh;
            /* Full viewport height */
        }

        #terminal-output {
            flex-grow: 1;
            /* Takes up available space */
            overflow-y: auto;
            /* Scrollable */
            padding: 15px;
            border: 1px solid #333;
            background-color: #111;
            /* Slightly darker output area */
            white-space: pre-wrap;
            /* Preserve whitespace and wrap lines */
            word-wrap: break-word;
            /* Break long words */
            font-size: 0.9em;
            line-height: 1.4;
        }

        #input-area {
            display: flex;
            padding: 10px;
            border-top: 1px solid #333;
            background-color: #252526;
            /* Input area background */
        }

        #prompt {
            padding-right: 8px;
            color: #569cd6;
            /* Prompt color */
        }

        #command-input {
            flex-grow: 1;
            background-color: transparent;
            border: none;
            color: #d4d4d4;
            /* Input text color */
            outline: none;
            /* Remove focus border */
            font-family: inherit;
            /* Use body font */
            font-size: 1em;
        }

        .log-info {
            color: #cccccc;
        }

        .log-debug {
            color: #888888;
        }

        .log-warning {
            color: #cca700;
        }

        .log-error {
            color: #f44747;
        }

        .log-critical {
            color: #ff0000;
            font-weight: bold;
        }

        .email-result {
            color: #4ec9b0;
        }

        /* Teal color for emails */
        .info-message {
            color: #569cd6;
        }

        /* Blue for general info */
    </style>
</head>

<body>

    <div id="terminal-output">
        <div class="info-message">Welcome to the Email Harvester Web Interface!</div>
        <div class="info-message">Enter your command below (e.g., https://example.com -d 3).</div>
        <div class="info-message">Connecting to server...</div>
    </div>

    <div id="input-area">
        <span id="prompt">&gt;</span>
        <input type="text" id="command-input" autofocus autocomplete="off">
    </div>

    <script>
        const outputArea = document.getElementById('terminal-output');
        const commandInput = document.getElementById('command-input');
        const promptElement = document.getElementById('prompt');

        let websocket = null;
        // Generate a unique client ID for this session
        const clientId = `client-${Date.now()}-${Math.random().toString(36).substring(2, 15)}`;

        function connectWebSocket() {
            // Construct WebSocket URL based on window location
            const wsProtocol = window.location.protocol === 'https:' ? 'wss:' : 'ws:';
            const wsUrl = `${wsProtocol}//${window.location.host}/ws/${clientId}`;

            websocket = new WebSocket(wsUrl);

            websocket.onopen = (event) => {
                addOutput("WebSocket connection established.", "info-message");
                commandInput.disabled = false; // Enable input
            };

            websocket.onmessage = (event) => {
                const message = event.data;
                addOutput(message); // Add raw message, styling applied via prefix
            };

            websocket.onerror = (event) => {
                addOutput("WebSocket error. Check server logs.", "log-error");
                console.error("WebSocket Error: ", event);
                commandInput.disabled = true; // Disable input on error
            };

            websocket.onclose = (event) => {
                addOutput(`WebSocket connection closed (Code: ${event.code}, Reason: ${event.reason || 'N/A'}). Attempting to reconnect...`, "log-warning");
                commandInput.disabled = true; // Disable input
                // Simple reconnect logic (consider exponential backoff for production)
                setTimeout(connectWebSocket, 5000);
            };
        }

        function addOutput(message, baseClass = null) {
            const line = document.createElement('div');

            // Basic prefix-based styling
            if (message.startsWith('[LOG]')) {
                const logMessage = message.substring(5).trim();
                line.textContent = logMessage; // Display only the message part
                // Apply class based on log level detected in the message
                if (logMessage.includes('- INFO -')) line.classList.add('log-info');
                else if (logMessage.includes('- DEBUG -')) line.classList.add('log-debug');
                else if (logMessage.includes('- WARNING -')) line.classList.add('log-warning');
                else if (logMessage.includes('- ERROR -')) line.classList.add('log-error');
                else if (logMessage.includes('- CRITICAL -')) line.classList.add('log-critical');
                else line.classList.add('log-info'); // Default for logs
            } else if (message.startsWith('[ERROR]') || message.startsWith('[CRITICAL]')) {
                line.textContent = message;
                line.classList.add('log-error');
            } else if (message.startsWith('[WARN]')) {
                line.textContent = message;
                line.classList.add('log-warning');
            } else if (message.startsWith('[INFO]')) {
                line.textContent = message;
                line.classList.add('info-message');
            } else if (message.includes('@') && message.includes('.')) {
                // Simple check if it looks like an email result
                line.textContent = message;
                line.classList.add('email-result');
            } else {
                line.textContent = message;
                if (baseClass) {
                    line.classList.add(baseClass);
                } else {
                    line.classList.add('info-message'); // Default class
                }
            }

            outputArea.appendChild(line);
            // Scroll to the bottom
            outputArea.scrollTop = outputArea.scrollHeight;
        }

         commandInput.addEventListener('keydown', async (event) => {
             if (event.key === 'Enter' && commandInput.value.trim() !== '') {
                 const command = commandInput.value.trim();
                 addOutput(`${promptElement.textContent} ${command}`); // Echo command
                 commandInput.disabled = true; // Disable input while processing

                 // --- START: Corrected client-side parsing logic ---
                 // Use the raw command string entered by the user, without the echoed prompt
                 const rawCommandInput = command;

                 // Split the command string entered by the user (without the echoed prompt)
                 const parts = rawCommandInput.split(/\s+/).filter(part => part.length > 0); // Split and remove empty parts
                 let requestBody = { client_id: clientId }; // Start with client ID

                 if (parts.length > 0) {
                     // Now, the first non-empty part should be the URL
                     requestBody.start_url = parts[0]; // Assume the first non-empty part is the URL

                     // Parse options starting from the second part (index 1)
                     for (let i = 1; i < parts.length; i++) { // Loop through remaining parts
                         const part = parts[i];

                         // Check if the part is an option flag (starts with - or --)
                         if (part.startsWith('-')) {
                            const option = part;
                            const nextPart = parts[i + 1]; // Look at the next part for a value

                            switch (option) {
                                case '-o':
                                case '--output':
                                    if (nextPart && !nextPart.startsWith('-')) {
                                        requestBody.output = nextPart;
                                        i++; // Consume the value
                                    } else {
                                        addOutput(`[WARN] Option ${option} requires a value.`, 'log-warning');
                                    }
                                    break;
                                case '-d':
                                case '--depth':
                                    if (nextPart && !nextPart.startsWith('-')) {
                                        requestBody.depth = parseInt(nextPart, 10);
                                        if (isNaN(requestBody.depth)) {
                                            addOutput(`[WARN] Invalid value for ${option}: ${nextPart}. Must be an integer.`, 'log-warning');
                                            delete requestBody.depth; // Remove invalid entry
                                        }
                                        i++; // Consume the value
                                    } else {
                                        addOutput(`[WARN] Option ${option} requires a value.`, 'log-warning');
                                    }
                                    break;
                                case '-p':
                                case '--max-pages':
                                    if (nextPart && !nextPart.startsWith('-')) {
                                        requestBody.max_pages = parseInt(nextPart, 10);
                                         if (isNaN(requestBody.max_pages)) {
                                            addOutput(`[WARN] Invalid value for ${option}: ${nextPart}. Must be an integer.`, 'log-warning');
                                            delete requestBody.max_pages; // Remove invalid entry
                                        }
                                        i++; // Consume the value
                                    } else {
                                        addOutput(`[WARN] Option ${option} requires a value.`, 'log-warning');
                                    }
                                    break;
                                case '-r':
                                case '--rate':
                                    if (nextPart && !nextPart.startsWith('-')) {
                                        requestBody.rate_limit = parseFloat(nextPart); // Match server's key name 'rate_limit'
                                         if (isNaN(requestBody.rate_limit)) {
                                            addOutput(`[WARN] Invalid value for ${option}: ${nextPart}. Must be a number.`, 'log-warning');
                                            delete requestBody.rate_limit; // Remove invalid entry
                                        }
                                        i++; // Consume the value
                                    } else {
                                         addOutput(`[WARN] Option ${option} requires a value.`, 'log-warning');
                                    }
                                    break;
                                case '--scope':
                                    if (nextPart && !nextPart.startsWith('-')) {
                                        if (nextPart === 'domain' || nextPart === 'subdomain') {
                                            requestBody.scope = nextPart;
                                        } else {
                                            addOutput(`[WARN] Invalid scope value: ${nextPart}. Must be 'domain' or 'subdomain'.`, 'log-warning');
                                        }
                                        i++; // Consume the value
                                    } else {
                                         addOutput(`[WARN] Option ${option} requires a value ('domain' or 'subdomain').`, 'log-warning');
                                    }
                                    break;
                                case '-ua':
                                case '--user-agent':
                                     if (nextPart && !nextPart.startsWith('-')) {
                                        requestBody.user_agent = nextPart;
                                        i++; // Consume the value
                                    } else {
                                         addOutput(`[WARN] Option ${option} requires a value.`, 'log-warning');
                                    }
                                     break;
                                case '--concurrency':
                                     if (nextPart && !nextPart.startsWith('-')) {
                                        requestBody.concurrency = parseInt(nextPart, 10);
                                         if (isNaN(requestBody.concurrency)) {
                                            addOutput(`[WARN] Invalid value for ${option}: ${nextPart}. Must be an integer.`, 'log-warning');
                                            delete requestBody.concurrency; // Remove invalid entry
                                        }
                                        i++; // Consume the value
                                    } else {
                                         addOutput(`[WARN] Option ${option} requires a value.`, 'log-warning');
                                    }
                                     break;
                                case '-v':
                                case '--verbose':
                                     requestBody.verbose = true; // This is a boolean flag
                                     // No value to consume, don't increment i
                                     break;

                                default:
                                     addOutput(`[WARN] Ignoring unknown option: ${option}`, 'log-warning');
                                     // Don't consume nextPart as it might be another option or URL
                                     break;
                            }
                         } else {
                             // If a part doesn't start with '-' and it's not the first part,
                             // it might be an argument placed incorrectly, or part of a value
                             // without a preceding option (less likely with CLI style).
                             // For this basic parser, we'll warn and ignore.
                             addOutput(`[WARN] Ignoring unexpected argument: ${part}`, 'log-warning');
                         }
                     }

                 } else {
                     addOutput("[ERROR] Please enter a command with a start URL.", 'log-error');
                     commandInput.disabled = false;
                     commandInput.focus();
                     return; // Stop here if no command parts
                 }
                 // Check if start_url was actually set (e.g., if only options were entered)
                 if (!requestBody.start_url || requestBody.start_url.startsWith('-')) {
                     addOutput("[ERROR] Invalid command format. Start URL is required as the first argument.", 'log-error');
                     commandInput.disabled = false;
                     commandInput.focus();
                     return;
                 }
                 // --- END: Corrected client-side parsing logic ---


                 try {
                     const response = await fetch('/run', {
                         method: 'POST',
                         headers: {
                             'Content-Type': 'application/json',
                         },
                         body: JSON.stringify(requestBody), // Use the parsed requestBody
                     });

                     // ... rest of the fetch response handling ...
                      const result = await response.json();

                     if (response.status >= 400) { // Check for HTTP error status
                         // FastAPI/Pydantic validation errors will come here with status 422
                         addOutput(`[ERROR] Server responded with status ${response.status}: ${result.detail ? JSON.stringify(result.detail) : result.message}`, 'log-error');
                         commandInput.disabled = false; // Re-enable on error
                         commandInput.focus();
                     } else if (result.status && result.status !== 'ok') { // Handle application-level errors from the server's JSON response
                         addOutput(`[ERROR] Failed to start command: ${result.message}`, 'log-error');
                         commandInput.disabled = false; // Re-enable on error
                         commandInput.focus();
                     }
                     else {
                         addOutput(`[INFO] Task started successfully. Output will stream below.`, 'info-message');
                         // Input remains disabled until the task finishes (signaled by server or manually re-enabled)
                         // A better approach might wait for a "[INFO] Task finished." message via WebSocket.
                         commandInput.disabled = false; // Re-enable input after successful start
                         commandInput.focus();
                     }

                 } catch (error) {
                     addOutput(`[ERROR] Network or server error sending command: ${error}`, 'log-error');
                     commandInput.disabled = false; // Re-enable on error
                     commandInput.focus();
                 } finally {
                     commandInput.value = ''; // Clear input field
                 }
             }
         });

        // Initial connection
        commandInput.disabled = true; // Disable input until WebSocket connects
        connectWebSocket();

    </script>

</body>

</html>
